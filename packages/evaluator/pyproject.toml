[project]
name = "rag-forge-evaluator"
version = "0.2.2"
description = "Evaluation engine: RAGAS, DeepEval, LLM-as-Judge, and audit report generation"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Femi Adedayo" }]
keywords = ["rag", "evaluation", "ragas", "deepeval", "llm-as-judge", "rmm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
readme = "README.md"
dependencies = [
    "pydantic>=2.0",
    "jinja2>=3.1",
    "anthropic>=0.30",
    "openai>=1.30",
    "rag-forge-observability>=0.1.1",
]

[project.urls]
Homepage = "https://github.com/hallengray/rag-forge"
Repository = "https://github.com/hallengray/rag-forge"
Issues = "https://github.com/hallengray/rag-forge/issues"
Documentation = "https://github.com/hallengray/rag-forge#readme"

[project.optional-dependencies]
ragas = ["ragas>=0.4,<0.6", "datasets>=2.14"]
ragas-voyage = ["voyageai>=0.2"]
deepeval = ["deepeval>=1.0"]
pdf = ["playwright>=1.40"]

[project.scripts]
rag-forge-eval = "rag_forge_evaluator.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_forge_evaluator"]
# NOTE: Do NOT add a [tool.hatch.build.targets.wheel.force-include] entry for
# ``report/templates``. ``packages`` already ships the whole tree including
# the Jinja template, and force-include would duplicate files inside the
# built wheel's ZIP archive — which PyPI's 2025+ strict validator rejects
# with "400 Invalid distribution file. Duplicate filename in local headers."

[tool.pytest.ini_options]
markers = [
    "ragas_integration: opt-in integration test that imports real ragas",
    "visual: opt-in Playwright visual regression test",
]
