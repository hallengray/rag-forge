[project]
name = "rag-forge-core"
version = "0.1.0"
description = "RAG pipeline primitives: ingestion, retrieval, context management, and security"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pydantic>=2.0",
    "rich>=13.0",
    "tiktoken>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_forge_core"]
