name: RAG Audit Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/core/src/**"
      - "packages/evaluator/src/**"
      - "eval/**"
      - "rag-forge.config.*"

jobs:
  audit:
    name: RAG Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --all-packages

      - name: Build CLI
        run: pnpm exec turbo run build

      - name: Run RAG Audit
        run: |
          uv run python -m rag_forge_evaluator.cli audit \
            --golden-set eval/golden_set.json \
            --judge mock \
            --output ./reports \
            --evaluator llm-judge

      - name: Check gate metric
        run: |
          METRIC="faithfulness"
          THRESHOLD="0.85"
          SCORE=$(jq -r ".metrics.${METRIC}.score" reports/audit-report.json)
          echo "Gate metric: ${METRIC}, Score: ${SCORE}, Threshold: ${THRESHOLD}"
          if (( $(echo "$SCORE < $THRESHOLD" | bc -l) )); then
            echo "::error::${METRIC} score (${SCORE}) is below threshold (${THRESHOLD})"
            exit 1
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-audit-report
          path: reports/
