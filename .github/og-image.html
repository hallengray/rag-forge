<!doctype html>
<!--
  Source for .github/og-image.png (1280x640 social preview).

  To regenerate after editing this file (no project devDeps required):

    npx -y playwright@latest install chromium
    node -e "const {chromium}=require('playwright');(async()=>{const b=await chromium.launch();const c=await b.newContext({viewport:{width:1280,height:640},deviceScaleFactor:2});const p=await c.newPage();await p.goto('file://'+process.cwd()+'/.github/og-image.html',{waitUntil:'networkidle'});await p.waitForTimeout(500);await p.screenshot({path:'.github/og-image.png'});await b.close();})()"

  Then upload the new PNG via repo Settings -> Social preview.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RAG-Forge OG</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1280px;
        height: 640px;
        background: #0f172a;
        font-family: "Inter", system-ui, sans-serif;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        padding: 72px 80px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .brand {
        font-size: 88px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .brand .accent {
        color: #f97316;
      }
      .rule {
        width: 120px;
        height: 6px;
        background: #f97316;
        margin: 20px 0 32px;
        border-radius: 3px;
      }
      .tagline {
        font-size: 44px;
        font-weight: 400;
        line-height: 1.2;
        color: #e2e8f0;
        max-width: 900px;
      }
      .rmm {
        display: flex;
        align-items: flex-end;
        gap: 14px;
        margin-top: 24px;
      }
      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .step .level {
        font-size: 22px;
        font-weight: 600;
        color: #ffffff;
      }
      .step .name {
        font-size: 14px;
        color: #94a3b8;
      }
      .arrow {
        color: #f97316;
        font-size: 24px;
        font-weight: 800;
        padding-bottom: 18px;
      }
      .foot {
        font-size: 18px;
        color: #94a3b8;
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .foot .dot {
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <div class="brand">RAG-<span class="accent">Forge</span></div>
        <div class="rule"></div>
        <div class="tagline">
          Production-grade RAG pipelines<br />with evaluation baked in.
        </div>
      </div>
      <div class="rmm">
        <div class="step"><div class="level">RMM-0</div><div class="name">Naive</div></div>
        <div class="arrow">▶</div>
        <div class="step"><div class="level">RMM-1</div><div class="name">Recall</div></div>
        <div class="arrow">▶</div>
        <div class="step"><div class="level">RMM-2</div><div class="name">Precision</div></div>
        <div class="arrow">▶</div>
        <div class="step"><div class="level">RMM-3</div><div class="name">Trust</div></div>
        <div class="arrow">▶</div>
        <div class="step"><div class="level">RMM-4</div><div class="name">Workflow</div></div>
        <div class="arrow">▶</div>
        <div class="step"><div class="level">RMM-5</div><div class="name">Enterprise</div></div>
      </div>
      <div class="foot">
        <span>rag-forge-site.vercel.app</span>
        <span class="dot">·</span>
        <span>npm: @rag-forge/cli</span>
      </div>
    </div>
  </body>
</html>
