name: RAG Audit Gate

# This workflow template is used by scaffolded projects to gate PRs on evaluation quality.
# It runs rag-forge audit and blocks merge if faithfulness drops below the configured threshold.
#
# To use in your project:
# 1. Copy this workflow to your .github/workflows/ directory
# 2. Configure the golden set path and thresholds in rag-forge.config.ts
# 3. Ensure rag-forge is installed as a dev dependency

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "eval/**"
      - "rag-forge.config.*"

jobs:
  audit:
    name: RAG Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync

